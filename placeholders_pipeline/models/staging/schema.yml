version: 2

models:
  - name: stg_jsonplaceholder_posts
    description: "Staging model for JSONPlaceholder posts"
    
    columns:
      - name: post_id
        description: "Unique identifier of the post"
        tests:
          - not_null
          - unique

      - name: user_id
        description: "User who created the post"
        tests:
          - not_null